<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>misc-tools</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>misc-tools</h1>
      <p class="subtitle">
        Small, self-contained browser utilities. No install, no backend, and no data sent over the network.
      </p>
    </header>

    <section class="tools">
      <h2>Tools</h2>
      <ul class="tool-list">
        <li>
          <a href="transactions-summary/">
            <span class="tool-name">Transaction Summary</span>
            <span class="tool-desc">Paste a transaction list and get totals, per-line amounts, and parse warnings. Defaults to INR; supports USD, EUR, and GBP.</span>
          </a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
